<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            background-image: url(fons.png);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;

        }
        h1{
            color:rgb(49, 53, 85);
            font-size: 50px;
        }
        input{
            display: block;
            margin: 10px;
            padding: 10px 15px;
            border-radius: 10px;
            width: 280px;
            font-size: 20px;

        }
        button{
            padding: 10px;
            background-color:rgb(49, 53, 85);
            color: white;
            font-weight: bold;
            width: 200px;
            margin-top: 15px;
            border-radius: 14px;
            cursor: pointer;
        }
        .form-box{
            background: rgb(240, 240, 240);
            height:400px;
            width: 700px
        }
    </style>
<div class="form-box">
    <h1>Reģistrācijas Forma</h1>
    <input placeholder="Username" id="UserNameField" type="text">
    <input placeholder="Password" id="PassWordField" type="password">
    <input placeholder="Email" id="EmailField" type="email">
    <button onclick="submit()" id="SubmitButton" type="submit">Submit</button>
</div>

    <script>
        function submit(){
            alert("Reģistrēšanās veiksmīga!");
        }
    </script>
</body>
</html>
